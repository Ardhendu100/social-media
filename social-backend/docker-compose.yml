version: '3.9'

services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_NAME=social
      - DJANGO_DB_USER=social
      - DJANGO_DB_PASSWORD=socialpass
    depends_on:
      - postgres

  user-service:
    build: ./user-service
    ports:
      - "8001:8001"
    environment:
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_NAME=social
      - DJANGO_DB_USER=social
      - DJANGO_DB_PASSWORD=socialpass
    depends_on:
      - postgres
    volumes:
      - ./user-service:/app

  post-service:
    build: ./post-service
    ports:
      - "8002:8002"
    environment:
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_NAME=social
      - DJANGO_DB_USER=social
      - DJANGO_DB_PASSWORD=socialpass
    depends_on:
      - postgres
    volumes:
      - ./post-service:/app

  feed-service:
    build: ./feed-service
    ports:
      - "8003:8003"
    environment:
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_NAME=social
      - DJANGO_DB_USER=social
      - DJANGO_DB_PASSWORD=socialpass
    depends_on:
      - postgres
    volumes:
      - ./feed-service:/app
  notification-service:
    build: ./notification-service
    ports:
      - "8004:8004"
    environment:
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_NAME=social
      - DJANGO_DB_USER=social
      - DJANGO_DB_PASSWORD=socialpass
    depends_on:
      - postgres
    volumes:
      - ./notification-service:/app

  search-service:
    build: ./search-service
    ports:
      - "8005:8005"
    environment:
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_NAME=social
      - DJANGO_DB_USER=social
      - DJANGO_DB_PASSWORD=socialpass
    depends_on:
      - postgres
    volumes:
      - ./search-service:/app

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: social
      POSTGRES_PASSWORD: socialpass
      POSTGRES_DB: social
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
